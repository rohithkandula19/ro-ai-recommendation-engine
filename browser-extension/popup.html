<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; width: 280px; padding: 14px; background: #0b0b0b; color: #fff; }
    h1 { font-size: 14px; margin: 0 0 10px; color: #E50914; }
    label { display: block; margin-top: 10px; font-size: 12px; color: #999; }
    input { width: 100%; padding: 6px; background: #222; color: #fff; border: 1px solid #333; border-radius: 4px; }
    button { margin-top: 14px; width: 100%; padding: 8px; background: #E50914; color: #fff; border: 0; border-radius: 4px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <h1>RO Settings</h1>
  <label>API URL
    <input id="apiUrl" placeholder="https://api.ro-rec.com">
  </label>
  <label>Access token
    <input id="token" placeholder="Bearer token from /auth/login">
  </label>
  <button id="save">Save</button>
  <p style="font-size:10px;color:#666;margin-top:14px">Highlight any movie/TV title on a page, right-click → Rate in RO.</p>
  <script src="popup.js"></script>
</body>
</html>
