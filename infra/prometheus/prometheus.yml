global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "ml_service"
    metrics_path: /metrics
    static_configs:
      - targets: ["ml_service:8001"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
