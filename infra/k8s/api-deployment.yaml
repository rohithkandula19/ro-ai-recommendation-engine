apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ro-rec-engine
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: YOUR_ECR/ro-rec-engine-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: rec-engine-config }
            - secretRef: { name: rec-engine-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits: { cpu: "1000m", memory: "1024Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ro-rec-engine
spec:
  selector: { app: api }
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: ro-rec-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
