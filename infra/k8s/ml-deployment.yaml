apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ro-rec-engine
spec:
  replicas: 2
  selector: { matchLabels: { app: ml-service } }
  template:
    metadata:
      labels: { app: ml-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: ml-service
          image: YOUR_ECR/ro-rec-engine-ml:latest
          ports: [{ containerPort: 8001 }]
          envFrom:
            - configMapRef: { name: rec-engine-config }
            - secretRef: { name: rec-engine-secrets }
          resources:
            requests: { cpu: "500m", memory: "1024Mi" }
            limits: { cpu: "2000m", memory: "2048Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: ro-rec-engine
spec:
  selector: { app: ml-service }
  ports: [{ port: 8001, targetPort: 8001 }]
  type: ClusterIP
